behaviors:
  Seeker:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 0.0003
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
      beta_schedule: linear
      epsilon_schedule: linear
    network_settings:
      normalize: false
      hidden_units: 128
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 1000000
    time_horizon: 64
    summary_freq: 20000

environment_parameters:
  maze_enabled:
    curriculum:
      - name: OpenRoom
        completion_criteria:
          measure: reward
          behavior: Seeker
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.7
        value: 0.0
      - name: Maze
        value: 1.0
